              - column:
                  name: title
                  type: varchar(40)
                  constraints:
                    nullable: false
                    unique: true
        - createIndex:
            indexName: idx_id_roles
            tableName: roles
            columns:
              - column:
                  name: id
            clustered: true

  - changeSet:
      id: 4-13.04.2023-users_roles
      author: Cidik Valera
